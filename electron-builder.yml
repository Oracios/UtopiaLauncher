appId: 'fr.utopia.launcher'
productName: 'Utopia Launcher'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2026 Utopia'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs,IMPORT,tools,.github,.claude,CLAUDE.md}'

extraResources:
  - 'libraries'

# Windows Configuration
win: 
  target: 
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux:
  target: 'AppImage'
  maintainer: 'Hugo Loureiro <loureirohugo70@gmail.com>'
  vendor: 'Utopia'
  synopsis: 'Launcher Minecraft Utopia'
  description: 'Launcher officiel du serveur Utopia. Mods, configurations et mises à jour sont téléchargés automatiquement.'
  category: 'Game'

publish:
  provider: github
  owner: Oracios
  repo: UtopiaLauncher
  releaseType: release

directories:
  buildResources: 'build'
  output: 'dist'