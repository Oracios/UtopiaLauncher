name: Update Modpack

# Trigger : bouton "Run workflow" sur GitHub (onglet Actions).
# Regenere le distribution.json en scannant directement le FTP, puis le re-uploade.
# Pas besoin d'avoir le drive Y: monte : tout se passe sur GitHub.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Type de bump de version du modpack'
        type: choice
        options:
          - minor
          - patch
          - major
          - none
        default: minor

permissions:
  contents: read

jobs:
  update:
    name: Regenerate distribution.json depuis le FTP
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate + upload distribution.json
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 tools/generate-distribution-from-ftp.py --bump "${{ inputs.bump }}"

      - name: Summary
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('docs/distribution.json'))['servers'][0]['version'])")
          COUNT=$(python3 -c "import json; print(len(json.load(open('docs/distribution.json'))['servers'][0]['modules']))")
          echo "## Modpack regenere :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Champ | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version modpack | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump | \`${{ inputs.bump }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Modules | ${COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| En ligne | https://apk.nerysia.fr/utopia-laucher/distribution.json |" >> $GITHUB_STEP_SUMMARY
